<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Charlie Lux Home | Premium Membership</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Outfit', sans-serif; 
      background: linear-gradient(135deg, #EFEBE8 0%, #DCD7D2 100%); 
    }
    .backdrop-blur-glass {
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      background-color: rgba(255, 255, 255, 0.75);
    }
  </style>
</head>
<body class="text-[#404142] min-h-screen flex items-center justify-center p-4 md:p-10 relative overflow-x-hidden">
  
  <!-- Subtle Elegant Background Spheres -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-slate-200/40 -top-40 -left-20 blur-3xl pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-stone-300/30 -bottom-40 -right-20 blur-3xl pointer-events-none"></div>

  <div class="backdrop-blur-glass border border-white/60 rounded-[32px] shadow-2xl overflow-hidden max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 min-h-[700px] relative z-10">
    
    <!-- Left Promotional Panel (5 Columns) -->
    <div class="hidden lg:flex lg:col-span-5 p-12 flex-col justify-between relative bg-cover bg-center overflow-hidden" style="background-image: linear-gradient(to bottom, rgba(64,65,66,0.2), rgba(26,26,26,0.7)), url('interior-design-without-text.jpg');">
      <div>
        <a href="index.html" class="inline-flex items-center gap-2 text-white font-medium tracking-wide bg-white/10 backdrop-blur-md border border-white/20 px-5 py-2.5 rounded-full hover:bg-white/20 transition duration-300">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          <span>Storefront</span>
        </a>
      </div>
      <div class="text-white">
        <span class="text-xs font-bold tracking-widest uppercase opacity-60 block mb-2">Exclusive Privilege</span>
        <h2 class="text-3xl font-light tracking-tight leading-tight mb-4">A Paradigm of <br><span class="font-semibold">Timeless Spaces</span></h2>
        <p class="opacity-80 font-poppins text-xs font-light leading-relaxed">Unlock access to private collections, tailored design resources, and exceptional welcome offers crafted for connoisseurs of fine living.</p>
      </div>
    </div>

    <!-- Right Form Panel (7 Columns) -->
    <div class="lg:col-span-7 p-8 md:p-16 flex flex-col justify-center">
      <div class="mb-10">
        <div class="lg:hidden mb-6">
          <a href="index.html" class="inline-flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-[#404142] hover:opacity-75 transition">
            ← Return Home
          </a>
        </div>
        <h1 class="text-4xl font-semibold tracking-tight text-black mb-2">Create Account</h1>
        <p class="text-sm opacity-60 font-poppins font-light">Enter the inner circle. Already registered? <a href="#" class="underline font-medium hover:text-black transition">Sign In</a></p>
      </div>

      <form id="signup-form" class="flex flex-col gap-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div class="flex flex-col gap-2">
            <label class="text-[11px] uppercase tracking-widest font-bold opacity-75">First Name</label>
            <input type="text" id="first-name" required class="h-13 px-5 rounded-2xl border border-stone-300/80 focus:outline-none focus:ring-2 focus:ring-[#404142]/30 focus:border-[#404142] bg-white/40 transition duration-300">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[11px] uppercase tracking-widest font-bold opacity-75">Last Name</label>
            <input type="text" id="last-name" required class="h-13 px-5 rounded-2xl border border-stone-300/80 focus:outline-none focus:ring-2 focus:ring-[#404142]/30 focus:border-[#404142] bg-white/40 transition duration-300">
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-[11px] uppercase tracking-widest font-bold opacity-75">Email Address</label>
          <input type="email" id="email" required class="h-13 px-5 rounded-2xl border border-stone-300/80 focus:outline-none focus:ring-2 focus:ring-[#404142]/30 focus:border-[#404142] bg-white/40 transition duration-300">
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-[11px] uppercase tracking-widest font-bold opacity-75">Secure Password</label>
          <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters" class="h-13 px-5 rounded-2xl border border-stone-300/80 focus:outline-none focus:ring-2 focus:ring-[#404142]/30 focus:border-[#404142] bg-white/40 transition duration-300">
        </div>

        <div class="flex items-start gap-3.5 mt-2">
          <input type="checkbox" id="marketing" checked class="w-4 h-4 mt-0.5 rounded border-stone-300 accent-[#404142] focus:ring-[#404142]/40">
          <label for="marketing" class="text-xs opacity-70 font-poppins font-light leading-relaxed select-none">
            I wish to receive architectural updates, new collections, and a unique 10% welcome invitation token.
          </label>
        </div>

        <button type="submit" class="h-14 bg-[#404142] hover:bg-black text-white font-medium rounded-2xl tracking-wide transition duration-300 mt-4 flex items-center justify-center gap-2 shadow-lg hover:shadow-xl active:scale-[0.99]">
          <span class="font-semibold text-base">Initialize Membership</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('signup-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert(`Welcome, ${document.getElementById('first-name').value}. Your digital portal setup is successful.`);
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
